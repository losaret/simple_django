<!doctype html>
{% load i18n %} 
{% load static %}
<html lang="en">
<head>
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<!-- Bootstrap CSS and JS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<!-- Remix Icon -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<!-- Turnstile -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<!-- favicon -->
<link rel="apple-touch-icon" sizes="57x57" href="{% static '/apple-icon-57x57.png' %}">
<link rel="apple-touch-icon" sizes="60x60" href="{% static '/apple-icon-60x60.png' %}">
<link rel="apple-touch-icon" sizes="72x72" href="{% static '/apple-icon-72x72.png' %}">
<link rel="apple-touch-icon" sizes="76x76" href="{% static '/apple-icon-76x76.png' %}">
<link rel="apple-touch-icon" sizes="114x114" href="{% static '/apple-icon-114x114.png' %}">
<link rel="apple-touch-icon" sizes="120x120" href="{% static '/apple-icon-120x120.png' %}">
<link rel="apple-touch-icon" sizes="144x144" href="{% static '/apple-icon-144x144.png' %}">
<link rel="apple-touch-icon" sizes="152x152" href="{% static '/apple-icon-152x152.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static '/apple-icon-180x180.png' %}">
<link rel="icon" type="image/png" sizes="192x192"  href="{% static '/android-icon-192x192.png' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% static '/favicon-32x32.png' %}">
<link rel="icon" type="image/png" sizes="96x96" href="{% static '/favicon-96x96.png' %}">
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">
<link rel="manifest" href="{% static '/manifest.json' %}">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
<meta name="theme-color" content="#ffffff">

<style>
  body {
      font-family: 'Inter', sans-serif;
      background-color: #F0FBF9;
  }
  .logo-font {
      font-family: 'Pacifico';
  }
  .bg-mint {
      background-color: #40B3A2;
  }
  .text-mint {
      color: #40B3A2;
  }
  .bg-neutral {
      background-color: #F0F7F4;
  }
  .header-blur {
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
  }

</style>

</head>
<body>
    <header class="sticky-top py-3 shadow-sm header-blur">
        <div class="container">
          <div class="row justify-content-between">
            <ul class="col-5 mb-2 d-flex flex-row p-0 list-unstyled">
              <li class="align-items-end me-4">
                <a href="{% url 'home' %}" class="m-0 p-0 text-decoration-none">
                  <span class="logo-font text-mint fs-3">Оцени</span>
                </a>
              </li>
              <li class="d-flex align-items-end me-4"><a href="{% url 'about' %}" class="text-dark text-decoration-none text-nowrap m-0 p-0">О проекте</a></li>
            </ul>
            {% if user.is_authenticated %}
            
            <form class="col-5 col-md-3 m-1 p-0" role="search" action="/search/" method="get">
              <input type="search" class="form-control" placeholder="Поиск..." aria-label="Search" value="{{ search_query|default:'' }}" name="query">
            </form>
            
            <div class="dropdown col-2 text-end p-0">
              <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                {% if user.extenduser.avatar %}
                  <img src="{{ user.extenduser.avatar.url }} " alt="mdo" width="32" height="32" class="rounded-circle">
                {% else %}
                  <img src="{% static 'avatar.jpg' %}" alt="mdo" width="32" height="32" class="rounded-circle">
                {% endif %}
              </a>
              <ul class="dropdown-menu text-small">
                <!-- <li><a class="dropdown-item" href="#">Настройки</a></li> -->
                <li><a class="dropdown-item" href="{% url 'user_profile:profile' %}">Профиль</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><form method="post" action="{% url 'user_profile:logout' %}">
                  {% csrf_token %}
                  <button class="btn btn-link" type="submit">Выйти</button>
              </form></li>
              </ul>
            </div>
            {% endif %}

          </div>
        </div>

      </header>

      {% block navbar %}
      {% endblock %}


      {% block content %}
      {% endblock %}

      {% block js %}
      {% endblock %}
  </body>
  </html>
