name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: registry.ratecard.ru
  IMAGE_NAME: web

jobs:

  build-and-deploy:

    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate git describe tag
      id: describe
      run: |
        GIT_TAG=$(git describe --tags --long --always 2>/dev/null || echo "dev-${GITHUB_SHA::8}")
        echo "tag=${GIT_TAG}" >> $GITHUB_OUTPUT
        echo "Generated tag: ${GIT_TAG}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.describe.outputs.tag }}
          type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
        
        labels: |
          org.opencontainers.image.title=${{ github.repository }}
          org.opencontainers.image.version=${{ steps.describe.outputs.tag }}
          org.opencontainers.image.revision=${{ github.sha }}