name: Docker Image CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: registry.ratecard.ru
  IMAGE_NAME: web

jobs:

  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mysite
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'mysite/requirements.txt'
      
      - name: Install dependencies
        run: |
          echo "Установка зависимостей"
          python -m pip install --upgrade pip
          pip install pytest pytest-django
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "Запуск pytest тестов"
          pytest

  build-and-deploy:
    needs: tests
    if: github.ref == 'refs/heads/main'
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate git describe tag
      id: describe
      run: |
        GIT_TAG=$(git describe --tags --long --always 2>/dev/null || echo "dev-${GITHUB_SHA::8}")
        echo "tag=${GIT_TAG}" >> $GITHUB_OUTPUT
        echo "Generated tag: ${GIT_TAG}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.describe.outputs.tag }}
          type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
        labels: |
          org.opencontainers.image.title=${{ github.repository }}
          org.opencontainers.image.version=${{ steps.describe.outputs.tag }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.repository.updated_at }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./mysite
        file: ./mysite/Dockerfile.prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_VERSION=${{ github.sha }}
          BUILD_DATE=${{ github.event.repository.updated_at }}